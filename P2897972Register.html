<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>
            Register | Threads&Co
        </title>
        <link rel="stylesheet" href="css/P2897972register.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    </head>
    <body>
        <header>
            <nav class="navigation">
                <a href="P2897972home.html" class="navbar">
                    <img src="Images/Logo.jpg" alt="logo" class="logo-img">
                </a>
            </nav>
        </header>
        <main>
            <div class="wrapper">
                <form id="register-form">
                    <h1>Sign up</h1>
                    <div class="input-box">
                        <input type="text" name="firstname" id="firstname-input"  placeholder="Firstname" required>
                        <label for="firstname-input"><i class="bx bx-user"></i></label>
                    </div>
                    <div class="input-box">
                        <input type="text" name="lastname" id="lastname-input" placeholder="Lastname" required >
                        <label for="firstname-input"><i class="bx bx-user"></i></label>
                    </div>
                    <div class="input-box">
                        <input type="text" name="email" id="email-input" placeholder="email" required>
                        <label for="email-input"><i class="bx bx-envelope"></i></label>
                    </div>
                    <div class="input-box">
                        <input type="password" name="password" id="password-input" placeholder="password" required>
                        <label for="password-input"><i class='bx bxs-lock-alt'></i></label>
                    </div>
                    <div class="input-box">
                        <input type="password" name="repeat-password" id="repeat-password-input" placeholder="Confirm password" required>
                        <label for="repeat-password-input"><i class='bx bxs-lock-alt'></i></label>
                    </div>
                    <button type="submit" class="btn">Sign Up</button>
                </form>
                <div class="login-link">
                    <p>Already have an account? <a href="P2897972login.html"> login</a></p>
                </div>
            </div>
        </main>
        <script type="module" src="js/P2897972register.js"></script>
    </body>
   
</html>
