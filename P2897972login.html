<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">

        <link rel="stylesheet" href="css/P2897972login.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <body>
        <header>
            <nav class="navigation">
                <a href="P2897972home.html" class="navbar">
                    <img src="Images/Logo.jpg" alt="logo" class="logo-img">
                </a>
                <ul class="nav-links">
                    <li><a href="P2897972login.html" class="navbar"><img src="Images/Login icon.jpg" alt="login" class="login-img"></a></li>
                    <li><a href="P2879363wishlist.html" class="navbar"><img src="Images/Wish icon.jpg" alt="wishlist" class="wishlist-img"></a></li>

                </ul>
            </nav>
        </header>
        <main>
            <div class="wrapper">
                <form id="login-form">
                    <h1>Login</h1>
                    <div class="input-box">
                        <input type="text" name="email"  placeholder="Email" required>
                        <i class='bx bx-user'></i>
                    </div>
                    <div class="input-box">
                       <input type="password" name="password" placeholder="Password "required>
                       <i class='bx bxs-lock-alt'></i>
                    </div>
                    <br>
                    <br>
                    <div class="remember-forgot">
                        <label><input type="checkbox">Remember me</label>
                        <a href="P2897972reset.html">Forgot pasword</a>
                    </div>
                    <button type="submit" class="btn">Login</button>
                    <div class="register-link">
                        <p class="register">Don't have an account?<a href="P2897972Register.html"> Register</a></p>
                    </div>
                </form>
            </div>
        </main>
        <script type="module" src="./js/P2897972login.js"></script>

    </body>
