<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Threads &amp; Co</title>
  <link rel="stylesheet" href="css/P2879363style.css">
</head>
<body>
  <header>
    <nav class="navigation">
      <a href="P2897972home.html" class="navbar">
        <img src="Images/Logo.jpg" alt="logo" class="logo-img">
      </a>
      <ul class="nav-links">
        <li><a href="P2897972login.html" class="navbar"><img src="Images/Login icon.jpg" alt="login" class="login-img"></a></li>
        <li><a href="P2879363wishlist.html" class="navbar"><img src="Images/Wish icon.jpg" alt="wishlist" class="wishlist-img"></a></li>
        <li><a href="P2879363checkout.html" class="navbar"><img src="Images/Cart icon.jpg" alt="checkout" class="checkout-img"></a></li>
      </ul>
    </nav>
  </header>
    
  <section class="hero-section">
    <div class="hero-content">
      <h1>Modern essentials for everyday dressing</h1>
      <p>Clean silhouettes, neutral tones, effortless pieces.</p>
    </div>
  </section>

  <main class="page-shell product-shell">
    <aside class="category-panel">
      <h3>Categories</h3>
      <a href="P2879363product.html" class="category-link {{CATEGORY_ALL}}">All</a>
      <a href="P2879363product?category=women" class="category-link {{CATEGORY_WOMEN}}">Women</a>
      <a href="P2879363product?category=girl" class="category-link {{CATEGORY_GIRL}}">Girl</a>
      <a href="P2879363product?category=accessories" class="category-link {{CATEGORY_ACCESSORIES}}">Accessories</a>
    </aside>

    <section class="catalog-section">
      <div class="section-top">
        <h2>{{CATEGORY_TITLE}}</h2>
        <a href="P2879363checkout.html" class="checkout-cta">Proceed to checkout</a>
      </div>

      {{ALERT}}

      <div class="product-grid">
        {{PRODUCT_CARDS}}
      </div>
    </section>
  </main>

  <footer class="footer-container">
    <ul class="footer-link">
      <li><img src="Images/Logo.jpg" alt="Threads & Co logo" class="logo-img"></li>
    <ul>
  </footer>
        
</body>
</html>
